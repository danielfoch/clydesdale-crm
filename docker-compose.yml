services:
  postgres:
    image: postgres:16-alpine
    container_name: warhorse-crm-postgres
    environment:
      POSTGRES_USER: warhorse
      POSTGRES_PASSWORD: warhorse
      POSTGRES_DB: warhorse_crm
    ports:
      - "54329:5432"
    volumes:
      - warhorse_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warhorse -d warhorse_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  warhorse_postgres:
