services:
  postgres:
    image: postgres:16-alpine
    container_name: clydesdale-crm-postgres
    environment:
      POSTGRES_USER: clydesdale
      POSTGRES_PASSWORD: clydesdale
      POSTGRES_DB: clydesdale_crm
    ports:
      - "54329:5432"
    volumes:
      - clydesdale_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clydesdale -d clydesdale_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clydesdale_postgres:
